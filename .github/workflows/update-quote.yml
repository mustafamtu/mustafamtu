name: Update Quote

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Update Quote
        run: node update-quote.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          git add README.md
          git -c user.name='mustafamtu' -c user.email='mustafamtu@icloud.com' commit -m "Update README with daily quote" -a || exit 0
          git push
